services:
  rsshub:
    container_name: rsshub
    image: diygod/rsshub:latest
    restart: unless-stopped
    ports:
      - 1200:1200
  freshrss:
    image: lscr.io/linuxserver/freshrss:latest
    container_name: freshrss
    restart: unless-stopped
    depends_on:
      - rsshub
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Beirut
    volumes:
      - ./config:/config
    ports:
      - 882:80
