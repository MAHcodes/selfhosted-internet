services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    restart: "unless-stopped"
    networks:
        - media
    ports:
      - 8096:8096/tcp
      - 7359:7359/udp
    volumes:
      - ./config:/config
      - ./cache:/cache
      - type: bind
        source: /home/ali/docker/servarr/data/media/movies/
        target: /movies
        read_only: true
      - type: bind
        source: /home/ali/Videos/
        target: /media
        read_only: true

networks:
  media:
    external: true
